<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>arXiv Explainers</title>
  <meta name="description" content="A library of AI-generated visual explainers of arXiv papers." />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="site">
      <h1>arXiv Explainers</h1>
      <p>Visual, AI-assisted walkthroughs of papers I'm reading.</p>
    </header>

    <ul class="list" id="list" aria-live="polite"></ul>
  </div>

  <script>
    const REQUIRED = ["title", "arxiv", "date", "file"];

    function isValid(e) {
      return e && typeof e === "object" && REQUIRED.every(k => typeof e[k] === "string" && e[k].length);
    }

    function linkFor(file) {
      // Markdown explainers open in the viewer; everything else links directly.
      return file.toLowerCase().endsWith(".md")
        ? "viewer.html?file=" + encodeURIComponent(file)
        : file;
    }

    // Allow only http(s) (and relative URLs that resolve to http/https);
    // block javascript:/data:/etc. Manifest is self-authored, so this is defense-in-depth.
    function safeUrl(u) {
      try {
        const parsed = new URL(u, location.href);
        return (parsed.protocol === "http:" || parsed.protocol === "https:") ? u : "#";
      } catch {
        return "#";
      }
    }

    function badgeFor(file) {
      return file.toLowerCase().endsWith(".md") ? "md" : "html";
    }

    function arxivId(url) {
      // New-style (2412.08972) or old-style (math.GT/0309136) identifiers.
      const m = url.match(/(\d{4}\.\d{4,5}|[a-z-]+(?:\.[A-Z]{2})?\/\d{7})/i);
      return m ? "arXiv:" + m[1] : "arXiv";
    }

    function render(entries) {
      const list = document.getElementById("list");
      const dropped = entries.length - entries.filter(isValid).length;
      if (dropped > 0) {
        console.warn(`${dropped} explainers.json entry(ies) skipped — each needs string fields: ${REQUIRED.join(", ")}.`);
      }
      const valid = entries.filter(isValid)
        .sort((a, b) => b.date.localeCompare(a.date));

      if (!valid.length) {
        list.innerHTML = '<li class="empty">No explainers yet. Add one to <code>explainers.json</code>.</li>';
        return;
      }

      list.innerHTML = valid.map(e => `
        <li class="entry">
          <a class="entry-link" href="${escapeHtml(safeUrl(linkFor(e.file)))}">${escapeHtml(e.title)}</a>
          <div class="meta">
            <span class="badge">${badgeFor(e.file)}</span>
            <a class="arxiv" href="${escapeHtml(safeUrl(e.arxiv))}" target="_blank" rel="noopener">${escapeHtml(arxivId(e.arxiv))}</a>
            <span class="date">${escapeHtml(e.date)}</span>
          </div>
        </li>`).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    fetch("explainers.json")
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(data => render(Array.isArray(data) ? data : []))
      .catch(err => {
        document.getElementById("list").innerHTML =
          '<li class="error">Could not load explainers.json — ' + escapeHtml(err.message) + '</li>';
      });
  </script>
</body>
</html>
