<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Explainer · arXiv Explainers</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="viewer">
    <a class="back" href="index.html">← All explainers</a>
    <div id="content" class="md"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"
          integrity="sha384-NNQgBjjuhtXzPmmy4gurS5X7P4uTt1DThyevz4Ua0IVK5+kazYQI1W27JHjbbxQz"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
          integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
          crossorigin="anonymous"></script>
  <script>
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    const params = new URLSearchParams(location.search);
    const file = params.get("file");
    const content = document.getElementById("content");

    function fail(msg) {
      content.classList.remove("md");
      content.innerHTML = '<p class="error">' + escapeHtml(msg) + "</p>";
    }

    // Only allow loading markdown files from within this repo.
    if (!file || !/^explainers\/[\w./-]+\.md$/i.test(file) || file.includes("..")) {
      fail("No valid markdown file specified.");
    } else {
      fetch(file)
        .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
        .then(md => {
          content.innerHTML = DOMPurify.sanitize(marked.parse(md));
          const h1 = content.querySelector("h1");
          if (h1) document.title = h1.textContent + " · arXiv Explainers";
        })
        .catch(err => fail("Could not load " + file + " — " + err.message));
    }
  </script>
</body>
</html>
